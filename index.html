<h2>荒らし報告</h2>
<div id="report"></div>

<script>

fetch("https://api.github.com/repos/masa-525/Miniature-keibi/issues")
.then(r=>r.json())
.then(data=>{

 let html=""

 data.forEach(i=>{
   html+=`
   <div style="border:1px solid #ccc;margin:10px;padding:10px;">
   <h3>${i.title}</h3>
   <pre>${i.body}</pre>
   </div>
   `
 })

 document.getElementById("report").innerHTML=html

})

</script>
